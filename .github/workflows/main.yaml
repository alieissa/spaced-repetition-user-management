# @format

name: Build
on:
  pull_request:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: authorizer
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Nodejs installation
        uses: actions/setup-node@v3
        with:
          node-version: 18 #Probably good idea not use a hard-coded value here

      - name: Packages installation
        run: npm insta

      - name: Compression
        run: zip -r authorizer.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.API_AUTHORIZER_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.API_AUTHORIZER_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.REGION }}

      - name: Authorizer deployment
        run: >
          aws lambda update-function-code 
          --function-name=spaced-repetition-user-management-authorizer 
          --zip-file=fileb://authorizer.zip

      - name: Authorizer keys deployment
        run: >
          aws lambda update-function-configuration
          --function-name spaced-repetition-user-management-authorizer
          --environment "Variables={REGION=${{ vars.REGION }}, API_AUTHORIZER_ACCESS_KEY_ID=${{ secrets.API_AUTHORIZER_ACCESS_KEY_ID }},API_AUTHORIZER_SECRET_ACCESS_KEY=${{ secrets.API_AUTHORIZER_SECRET_ACCESS_KEY }}}"
